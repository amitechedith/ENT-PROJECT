<div class="flex items-center justify-center min-h-screen bg-gray-100 relative">
    <div class="absolute inset-0 bg-[url('assets/ent-bg.jpg')] bg-cover bg-center opacity-40 blur-[2px]"></div>

    <div class="z-10 bg-white/90 backdrop-blur-md p-8 rounded-xl shadow-2xl w-full max-w-md border border-white/50">
        <div class="text-center mb-8">
            <img src="assets/ent-icon.jpeg" alt="Logo" class="w-16 h-16 mx-auto mb-4 rounded-full shadow-md">
            <h2 class="text-2xl font-bold text-blue-800">ENT Clinic</h2>
            <p class="text-sm text-gray-500">Sign in to your account</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative w-full">
                    <input type="text" pInputText formControlName="username" class="w-full pl-10"
                        placeholder="Enter username"
                        [ngClass]="{ 'ng-invalid ng-dirty': submitted && f['username'].errors }" />
                </div>
                <div *ngIf="submitted && f['username'].errors" class="text-red-500 text-xs mt-1">Username is required
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative w-full">
                    <p-password formControlName="password" [feedback]="false" [toggleMask]="true" styleClass="w-full"
                        inputStyleClass="w-full pl-10" placeholder="Enter password"></p-password>
                </div>
                <div *ngIf="submitted && f['password'].errors" class="text-red-500 text-xs mt-1">Password is required
                </div>
            </div>

            <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded text-sm text-center border border-red-200">
                {{ error }}
            </div>

            <button pButton label="Sign In" type="submit" [loading]="loading" class="w-full p-button-lg"></button>
        </form>
    </div>
</div>
