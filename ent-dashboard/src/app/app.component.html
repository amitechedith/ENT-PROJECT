<div class="h-screen overflow-hidden flex flex-col bg-gradient-to-br from-blue-50 via-sky-50 to-blue-100 text-gray-800">

  <!-- HEADER (Only if Logged In) -->
  <header *ngIf="currentUser$ | async as user"
    class="bg-white/90 backdrop-blur-md shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center space-x-3">
      <img src="assets/ent-icon.jpeg" alt="Clinic Logo" class="w-10 h-10 drop-shadow-md" />
      <h1 class="text-2xl md:text-3xl font-bold text-blue-700 tracking-tight">
        ENT Clinic Management
      </h1>
    </div>

    <div class="flex items-center gap-4">
      <p class="hidden md:block text-sm text-gray-500 italic">
        Welcome, <a routerLink="/profile"
          class="font-bold text-blue-600 hover:text-blue-800 hover:underline cursor-pointer">{{ user.fullName }}</a> ({{
        displayRoleLabel(user.role) }})
      </p>
      <button (click)="logout()"
        class="md:hidden bg-red-100 text-red-600 px-3 py-1 rounded text-xs hover:bg-red-200">Logout</button>
    </div>
  </header>

  <!-- NAVIGATION (Only if Logged In) -->
  <nav *ngIf="currentUser$ | async as user"
    class="bg-blue-700/95 backdrop-blur-sm text-white px-6 md:px-10 py-3 flex justify-between items-center shadow-md sticky top-[72px] z-40">
    <div class="flex space-x-6">

      <a *ngIf="['receptionist', 'admin', 'doctor'].includes(user.role)" routerLink="/reception"
        routerLinkActive="font-semibold border-b-2 border-yellow-400" class="hover:text-yellow-300 transition-all pb-1">
        Reception
      </a>

      <a *ngIf="['doctor', 'admin'].includes(user.role)" routerLink="/doctor/dashboard"
        routerLinkActive="font-semibold border-b-2 border-yellow-400" class="hover:text-yellow-300 transition-all pb-1">
        Doctor
      </a>

      <a *ngIf="['billing', 'admin', 'doctor', 'receptionist'].includes(user.role)" routerLink="/billing"
        routerLinkActive="font-semibold border-b-2 border-yellow-400" class="hover:text-yellow-300 transition-all pb-1">
        Prescription
      </a>

      <a *ngIf="['admin', 'doctor'].includes(user.role)" routerLink="/admin" routerLinkActive="font-semibold border-b-2 border-yellow-400"
        class="hover:text-yellow-300 transition-all pb-1">
        Admin
      </a>
    </div>

    <!-- Right side controls -->
    <div class="hidden md:flex items-center space-x-3">
      <button (click)="logout()" class="bg-white/20 px-3 py-1 rounded-lg text-sm hover:bg-white/30 transition">
        Logout
      </button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="flex-grow relative overflow-hidden flex flex-col">
    <div class="absolute inset-0 bg-[url('assets/ent-bg.jpg')] bg-cover bg-center opacity-40 blur-[1px]"></div>

    <div class="relative z-10 flex-grow flex flex-col p-4 md:p-6 overflow-hidden">
      <div
        class="bg-white/80 rounded-2xl shadow-xl backdrop-blur-sm border border-white/40 flex flex-col h-full overflow-hidden">

        <div class="flex-grow overflow-auto p-6 md:p-8">
          <router-outlet></router-outlet>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="text-center py-4 text-sm text-gray-600 border-t bg-white/70 backdrop-blur-sm mt-auto">
    © 2025 ENT Clinic | Designed for Specialists
  </footer>
</div>
